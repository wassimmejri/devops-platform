<nav class="sidebar" [class.sidebar--collapsed]="collapsed">

  <!-- ══ BRAND ══ -->
  <div class="sidebar__brand">

    <!-- Logo DevScope statique -->
    <div class="sidebar__logo">
      <svg class="logo-svg"
           [attr.width]="collapsed ? '26' : '30'"
           [attr.height]="collapsed ? '26' : '30'"
           viewBox="0 0 380 430" fill="none"
           xmlns="http://www.w3.org/2000/svg">
        <polygon fill="none" stroke="#00c8ff" stroke-width="2.5" opacity="0.9"
          points="190,10 366,112 366,314 190,416 14,314 14,112"/>
        <polygon fill="none" stroke="#00c8ff" stroke-width="1" opacity="0.3"
          points="190,38 342,128 342,298 190,390 38,298 38,128"/>
        <polygon fill="#0d1f33" stroke="#00c8ff" stroke-width="1.8" opacity="0.9"
          points="190,62 318,135 318,285 190,362 62,285 62,135"/>
        <circle fill="#00e5ff" cx="190" cy="10"  r="6"/>
        <circle fill="#00e5ff" cx="366" cy="112" r="6"/>
        <circle fill="#00e5ff" cx="366" cy="314" r="6"/>
        <circle fill="#00e5ff" cx="190" cy="416" r="6"/>
        <circle fill="#00e5ff" cx="14"  cy="314" r="6"/>
        <circle fill="#00e5ff" cx="14"  cy="112" r="6"/>
        <path fill="none" stroke="#00e5ff" stroke-width="2.5"
          d="M80,212 Q190,118 300,212 Q190,306 80,212 Z"/>
        <circle fill="#00c8ff" opacity="0.12" cx="190" cy="212" r="58"/>
        <circle fill="none" stroke="#00e5ff" stroke-width="2"   cx="190" cy="212" r="52"/>
        <circle fill="none" stroke="#00e5ff" stroke-width="1.5" cx="190" cy="212" r="36" opacity="0.5"/>
        <circle fill="#00e5ff" cx="190" cy="212" r="20"/>
        <circle fill="#0a0f1a" cx="190" cy="212" r="9"/>
        <polyline fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" opacity="0.6" points="190,10  190,38"/>
        <polyline fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" opacity="0.6" points="366,112 342,128"/>
        <polyline fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" opacity="0.6" points="366,314 342,298"/>
        <polyline fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" opacity="0.6" points="190,416 190,390"/>
        <polyline fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" opacity="0.6" points="14,314  38,298"/>
        <polyline fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" opacity="0.6" points="14,112  38,128"/>
      </svg>
    </div>

    <!-- Wordmark (caché en collapsed) -->
    <div class="sidebar__brand-text" *ngIf="!collapsed">
      <span class="sidebar__brand-name">Dev<span>Board</span></span>
      <span class="sidebar__brand-version">v1.0 · PFE 2026</span>
    </div>

    <!-- Bouton collapse — TOUJOURS VISIBLE -->
    <button class="sidebar__collapse-btn"
            (click)="toggleCollapse()"
            [title]="collapsed ? 'Déplier le menu' : 'Réduire le menu'">
      <i class="pi"
         [class.pi-chevron-left]="!collapsed"
         [class.pi-chevron-right]="collapsed"></i>
    </button>

  </div>

  <!-- ══ NAV ══ -->
  <div class="sidebar__nav">

    <!-- ─ MAIN ─ -->
    <div class="sidebar__section">
      <span class="sidebar__section-label" *ngIf="!collapsed">MAIN</span>

      <a class="nav-item" routerLink="/dashboard"
         routerLinkActive="nav-item--active"
         [title]="collapsed ? 'Dashboard' : ''">
        <div class="nav-item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
        </div>
        <span class="nav-item__label" *ngIf="!collapsed">Dashboard</span>
        <span class="nav-item__bar"></span>
      </a>

      <a class="nav-item" routerLink="/projects"
         routerLinkActive="nav-item--active"
         [title]="collapsed ? 'Projets' : ''">
        <div class="nav-item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
          </svg>
        </div>
        <span class="nav-item__label" *ngIf="!collapsed">Projets</span>
        <span class="nav-item__bar"></span>
      </a>

      <a *ngIf="isAdmin" class="nav-item" routerLink="/cluster"
         routerLinkActive="nav-item--active"
         [title]="collapsed ? 'Cluster' : ''">
        <div class="nav-item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="2" width="20" height="8" rx="2"/>
            <rect x="2" y="14" width="20" height="8" rx="2"/>
            <line x1="6" y1="6"  x2="6.01" y2="6"  stroke-linecap="round" stroke-width="2.5"/>
            <line x1="6" y1="18" x2="6.01" y2="18" stroke-linecap="round" stroke-width="2.5"/>
          </svg>
        </div>
        <span class="nav-item__label" *ngIf="!collapsed">Cluster</span>
        <span class="nav-item__bar"></span>
      </a>
    </div>

    <!-- ─ OBSERVABILITY ─ -->
    <div class="sidebar__section">
      <span class="sidebar__section-label" *ngIf="!collapsed">OBSERVABILITY</span>

      <a class="nav-item" routerLink="/logs"
         routerLinkActive="nav-item--active"
         [title]="collapsed ? 'Logs' : ''">
        <div class="nav-item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="8" y1="13" x2="16" y2="13"/>
            <line x1="8" y1="17" x2="16" y2="17"/>
          </svg>
        </div>
        <span class="nav-item__label" *ngIf="!collapsed">Logs</span>
        <span class="nav-item__bar"></span>
      </a>

      <a *ngIf="isAdmin" class="nav-item" routerLink="/alerts"
         routerLinkActive="nav-item--active"
         [title]="collapsed ? 'Alertes' : ''">
        <div class="nav-item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86l-8 14A2 2 0 004 21h16a2 2 0 001.71-3.14l-8-14a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9"  x2="12"   y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <span class="nav-item__label" *ngIf="!collapsed">Alertes</span>
        <span class="nav-item__bar"></span>
      </a>

      <a *ngIf="isAdmin" class="nav-item"
         href="http://grafana.devops.local:32347"
         target="_blank" rel="noopener noreferrer"
         [title]="collapsed ? 'Grafana' : ''">
        <div class="nav-item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <span class="nav-item__label" *ngIf="!collapsed">
          Grafana
          <i class="pi pi-external-link" style="font-size:9px; opacity:0.6; margin-left:4px"></i>
        </span>
        <span class="nav-item__bar"></span>
      </a>
    </div>

    <!-- ─ ADMIN ─ -->
    <div class="sidebar__section" *ngIf="isAdmin">
      <span class="sidebar__section-label" *ngIf="!collapsed">ADMIN</span>

      <a class="nav-item" routerLink="/admin/users"
         routerLinkActive="nav-item--active"
         [title]="collapsed ? 'Utilisateurs' : ''">
        <div class="nav-item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
        </div>
        <span class="nav-item__label" *ngIf="!collapsed">Utilisateurs</span>
        <span class="nav-item__bar"></span>
      </a>
    </div>

    <!-- ─ SYSTEM ─ -->
    <div class="sidebar__section">
      <span class="sidebar__section-label" *ngIf="!collapsed">SYSTEM</span>

      <div class="nav-item nav-item--soon" [title]="collapsed ? 'Settings (bientôt)' : ''">
        <div class="nav-item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </div>
        <span class="nav-item__label" *ngIf="!collapsed">Settings</span>
        <span class="soon-chip" *ngIf="!collapsed">soon</span>
      </div>
    </div>

  </div>

  <!-- ══ STATUS ══ -->
  <div class="sidebar__status" *ngIf="!collapsed">
    <span class="status-dot"></span>
    <span class="status-text">All systems operational</span>
  </div>

  <!-- ══ USER ══ -->
  <div class="sidebar__user">
    <div class="user-avatar">{{ userInitials }}</div>

    <div class="user-info" *ngIf="!collapsed">
      <div class="user-name">{{ userName }}</div>
      <span class="user-role-badge"
            [class.user-role-badge--admin]="isAdmin"
            [class.user-role-badge--dev]="!isAdmin">
        <i class="pi" [class.pi-shield]="isAdmin" [class.pi-code]="!isAdmin"></i>
        {{ isAdmin ? 'Admin DevOps' : 'Developer' }}
      </span>
    </div>

    <button class="logout-btn" (click)="confirmLogout($event)"
            title="Se déconnecter" *ngIf="!collapsed">
      <i class="pi pi-sign-out"></i>
    </button>
  </div>

</nav>

<p-confirmDialog styleClass="devboard-confirm-dialog" key="sidebar-logout"></p-confirmDialog>
